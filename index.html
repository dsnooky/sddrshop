<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bag Boutique (Google Sheet Powered)</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:#fff;color:#333;}

header{display:flex;justify-content:space-between;padding:20px 60px;border-bottom:1px solid #eee;}
header h1{color:#d4a373;}
nav a{margin-left:20px;text-decoration:none;color:#333;}

.hero{height:350px;background:#f3e9dc;display:flex;align-items:center;justify-content:center;flex-direction:column;}
.hero h2{font-size:36px;}

.section{padding:50px;}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px;}

.card{border:1px solid #eee;border-radius:12px;overflow:hidden;background:#fff;transition:0.3s;}
.card:hover{transform:translateY(-5px);box-shadow:0 10px 20px rgba(0,0,0,0.1);} 
.card img{width:100%;height:230px;object-fit:cover;}
.card-content{padding:15px;}
.card-content h3{font-size:16px;}
.card-content p{color:#d4a373;font-weight:bold;}

footer{text-align:center;padding:20px;background:#111;color:#fff;margin-top:40px;}
</style>
</head>

<body>

<header>
    <h1>Bag Boutique</h1>
    <nav>
        <a href="#">Home</a>
        <a href="#">Shop</a>
    </nav>
</header>

<section class="hero">
    <h2>Live Products from Google Sheet</h2>
</section>

<section class="section">
    <div class="grid" id="product-list"></div>
</section>

<footer>
    <p>© 2026 Bag Boutique</p>
</footer>

<script>
const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT5YDxOtOu5RDc8F_SW6NF-4hhL6Sd1H-16ZzaLAU8e_5lMLyopldwWK9VhAxZWeTLkwdJLWOMf2LMT/pub?gid=0&single=true&output=csv";

// Function to parse CSV (handles quoted commas)
function parseCSV(text) {
    const rows = text.trim().split("\n");
    const headers = rows.shift().match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g);
    return rows.map(row => {
        const values = row.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g);
        let obj = {};
        headers.forEach((h, i) => {
            if (!values[i]) return;
            obj[h.replace(/"/g,'')] = values[i].replace(/"/g,'');
        });
        return obj;
    }).filter(item => item.name && item.price && item.image); // Remove empty rows
}

async function loadProducts() {
    try {
        const res = await fetch(sheetURL);
        const csv = await res.text();
        const data = parseCSV(csv);

        const container = document.getElementById("product-list");
        container.innerHTML = "";

        data.forEach(item => {
            const isAdmin = window.location.search.includes("admin=true");
            container.innerHTML += `
                <div class="card">
                    <img src="${item.image}" alt="${item.name}">
                    <div class="card-content">
                        <h3>${item.name}</h3>
                        <p>₱${item.price}</p>
                        ${isAdmin && item.link ? `<a href="${item.link}" target="_blank" style="display:inline-block;margin-top:10px;padding:8px 12px;background:#d4a373;color:#fff;text-decoration:none;border-radius:6px;">View Affiliate Link</a>` : ``}
                    </div>
                </div>
            `;
        });

    } catch (err) {
        console.error("Error loading products:", err);
    }
}

loadProducts();
</script>

</body>
</html>
