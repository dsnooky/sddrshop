<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bag Boutique (Google Sheet Powered)</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:#fff;color:#333;}

header{display:flex;justify-content:space-between;padding:20px 60px;border-bottom:1px solid #eee;}
header h1{color:#d4a373;}
nav a{margin-left:20px;text-decoration:none;color:#333;}

.hero{height:350px;background:#f3e9dc;display:flex;align-items:center;justify-content:center;flex-direction:column;}
.hero h2{font-size:36px;}

.section{padding:50px;}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px;}

.card{border:1px solid #eee;border-radius:12px;overflow:hidden;background:#fff;transition:0.3s;}
.card:hover{transform:translateY(-5px);box-shadow:0 10px 20px rgba(0,0,0,0.1);} 
.card img{width:100%;height:230px;object-fit:cover;}
.card-content{padding:15px;}
.card-content h3{font-size:16px;}
.card-content p{color:#d4a373;font-weight:bold;}

footer{text-align:center;padding:20px;background:#111;color:#fff;margin-top:40px;}
</style>
</head>

<body>

<header>
    <h1>Bag Boutique</h1>
    <nav>
        <a href="#">Home</a>
        <a href="#">Shop</a>
    </nav>
</header>

<section class="hero">
    <h2>Live Products from Google Sheet</h2>
</section>

<section class="section">
    <div class="grid" id="product-list"></div>
</section>

<footer>
    <p>© 2026 Bag Boutique</p>
</footer>

<script>
// 🔥 STEP 1: Replace with your Google Sheet Web App URL
const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT5YDxOtOu5RDc8F_SW6NF-4hhL6Sd1H-16ZzaLAU8e_5lMLyopldwWK9VhAxZWeTLkwdJLWOMf2LMT/pub?gid=0&single=true&output=csv";

async function loadProducts(){
    try{
        const res = await fetch(sheetURL);
        const data = await res.json();

        const container = document.getElementById("product-list");
        container.innerHTML = "";

        data.forEach(item => {
            const isAdmin = window.location.search.includes("admin=true");

            container.innerHTML += `
                <div class="card">
                    <img src="${item.image}" alt="">
                    <div class="card-content">
                        <h3>${item.name}</h3>
                        <p>₱${item.price}</p>
                        
                        ${isAdmin && item.link ? `<a href="${item.link}" target="_blank" style="display:inline-block;margin-top:10px;padding:8px 12px;background:#d4a373;color:#fff;text-decoration:none;border-radius:6px;">View Affiliate Link</a>` : ``}
                    </div>
                </div>
            `;
        });

    }catch(err){
        console.error(err);
    }
}

loadProducts();
</script>

</body>
</html>


<!-- ================= SETUP GUIDE =================

STEP 1: Create Google Sheet
Columns:
name | price | image

STEP 2: Open Extensions > Apps Script
Paste this code:

function doGet() {
  const sheet = SpreadsheetApp.getActiveSpreadsheet().getSheetByName("Sheet1");
  const data = sheet.getDataRange().getValues();
  const headers = data.shift();

  const result = data.map(row => {
    let obj = {};
    headers.forEach((h, i) => obj[h] = row[i]);
    return obj;
  });

  return ContentService
    .createTextOutput(JSON.stringify(result))
    .setMimeType(ContentService.MimeType.JSON);
}

STEP 3: Deploy
Deploy > New deployment > Web App
Access: Anyone

STEP 4: Copy URL and paste in sheetURL

Now every time you update your Google Sheet, your website updates automatically 🔥
