<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elegant Bags Shop</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:#fff;color:#333;}

header{
    display:flex;
    justify-content:space-between;
    padding:20px 60px;
    background:#fff;
    border-bottom:1px solid #eee;
}

header h1{font-size:24px;color:#d4a373;}
nav a{margin-left:25px;text-decoration:none;color:#333;font-size:14px;}

.hero{
    height:450px;
    background:url('https://images.unsplash.com/photo-1593032465171-8f0c4a6b1c64') center/cover;
    display:flex;
    align-items:center;
    padding-left:60px;
    color:white;
}

.hero h2{font-size:42px;max-width:400px;}
.hero button{
    margin-top:20px;
    padding:12px 25px;
    border:none;
    background:#d4a373;
    color:white;
    cursor:pointer;
}

.section{padding:60px;}
.section h2{text-align:center;margin-bottom:30px;}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:25px;
}

.card{
    border:1px solid #eee;
    border-radius:15px;
    overflow:hidden;
    transition:0.3s;
    background:white;
}

.card:hover{transform:translateY(-5px);box-shadow:0 10px 20px rgba(0,0,0,0.1);}

.card img{
    width:100%;
    height:250px;
    object-fit:cover;
}

.card-content{padding:15px;}
.card-content h3{font-size:16px;margin-bottom:5px;}
.card-content p{color:#d4a373;font-weight:bold;}

.badge{
    position:absolute;
    background:#d4a373;
    color:white;
    padding:5px 10px;
    font-size:12px;
    border-radius:5px;
    margin:10px;
}

.categories{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:20px;
}

.cat{
    height:180px;
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
    font-size:20px;
    border-radius:15px;
}

.cat1{background:url('https://images.unsplash.com/photo-1584917865442-de89df76afd3') center/cover;}
.cat2{background:url('https://images.unsplash.com/photo-1590874103328-eac38a683ce7') center/cover;}
.cat3{background:url('https://images.unsplash.com/photo-1600185365483-26d7a4cc7519') center/cover;}

footer{
    background:#111;
    color:white;
    text-align:center;
    padding:25px;
    margin-top:40px;
}

</style>
</head>

<body>

<header>
    <h1>Bag Boutique</h1>
    <nav>
        <a href="#">Home</a>
        <a href="#">Shop</a>
        <a href="#">New</a>
        <a href="#">Contact</a>
    </nav>
</header>

<section class="hero">
    <div>
        <h2>Elegant Bags for Every Woman</h2>
        <button>Shop Now</button>
    </div>
</section>

<section class="section">
    <h2>Shop by Category</h2>
    <div class="categories">
        <div class="cat cat1">Handbags</div>
        <div class="cat cat2">Tote Bags</div>
        <div class="cat cat3">Mini Bags</div>
    </div>
</section>

<section class="section">
    <h2>Best Sellers</h2>
    <div class="grid">

        <div class="card">
            <img src="https://images.unsplash.com/photo-1581605405669-fcdf81165afa">
            <div class="card-content">
                <h3>Luxury Handbag</h3>
                <p>₱1,299</p>
            </div>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1600185365926-3a2ce3cdb9eb">
            <div class="card-content">
                <h3>Classic Tote Bag</h3>
                <p>₱899</p>
            </div>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1591561954557-26941169b49e">
            <div class="card-content">
                <h3>Mini Fashion Bag</h3>
                <p>₱699</p>
            </div>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1593032465171-8f0c4a6b1c64">
            <div class="card-content">
                <h3>Premium Shoulder Bag</h3>
                <p>₱1,499</p>
            </div>
        </div>

    </div>
</section>

<footer>
    <p>© 2026 Bag Boutique | Designed for Women's Fashion</p>
</footer>

</body>
</html>
