<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SDDR Shop</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
}

body{
    background:#f5f5f5;
}

/* HEADER */
header{
    background:#111;
    color:#fff;
    padding:15px 50px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

header h1{
    font-size:22px;
}

nav a{
    color:#fff;
    margin-left:20px;
    text-decoration:none;
    font-size:14px;
}

/* HERO */
.hero{
    height:400px;
    background:url('https://images.unsplash.com/photo-1512436991641-6745cdb1723f') center/cover;
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
    text-align:center;
}

.hero h2{
    font-size:40px;
}

.hero button{
    margin-top:15px;
    padding:10px 20px;
    border:none;
    background:#ff6a00;
    color:white;
    cursor:pointer;
}

/* PROMO BOXES */
.promo{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:20px;
    padding:40px;
}

.box{
    padding:40px;
    color:white;
}

.box1{ background:#ff6a00; }
.box2{ background:#333; }

/* PRODUCTS */
.products{
    padding:40px;
}

.products h2{
    text-align:center;
    margin-bottom:20px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:20px;
}

.card{
    background:white;
    padding:15px;
    text-align:center;
    border-radius:10px;
}

.card img{
    width:100%;
    height:180px;
    object-fit:cover;
}

.card h3{
    font-size:16px;
    margin:10px 0;
}

.card p{
    color:#ff6a00;
    font-weight:bold;
}

/* BRANDS */
.brands{
    padding:40px;
    text-align:center;
}

.brands img{
    width:80px;
    margin:10px;
}

/* FOOTER */
footer{
    background:#111;
    color:white;
    text-align:center;
    padding:20px;
    margin-top:30px;
}
</style>
</head>

<body>

<header>
    <h1>SDDR Shop</h1>
    <nav>
        <a href="#">Home</a>
        <a href="#">Shop</a>
        <a href="#">Contact</a>
    </nav>
</header>

<section class="hero">
    <div>
        <h2>New Collection 2026</h2>
        <button>Shop Now</button>
    </div>
</section>

<section class="promo">
    <div class="box box1">
        <h3>70% OFF</h3>
        <p>Limited Time Promo</p>
    </div>
    <div class="box box2">
        <h3>Free Shipping</h3>
        <p>On all orders</p>
    </div>
</section>

<section class="products">
    <h2>New Arrivals</h2>
    <div class="grid">

        <div class="card">
            <img src="https://images.unsplash.com/photo-1585386959984-a41552262a6d">
            <h3>Stylish Bag</h3>
            <p>₱599</p>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1526170375885-4d8ecf77b99f">
            <h3>Camera</h3>
            <p>₱2,999</p>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1512496015851-a90fb38ba796">
            <h3>Watch</h3>
            <p>₱899</p>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1513708927688-890a1c4b8d6b">
            <h3>Shoes</h3>
            <p>₱1,299</p>
        </div>

    </div>
</section>

<section class="brands">
    <h2>Brands</h2>
    <img src="https://upload.wikimedia.org/wikipedia/commons/2/24/Samsung_Logo.svg">
    <img src="https://upload.wikimedia.org/wikipedia/commons/f/fa/Apple_logo_black.svg">
    <img src="https://upload.wikimedia.org/wikipedia/commons/2/2f/Google_2015_logo.svg">
</section>

<footer>
    <p>© 2026 SDDR Shop | All Rights Reserved</p>
</footer>

</body>
</html>
